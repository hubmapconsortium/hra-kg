  mapping registry:
    name: mapping registry
    description: A registry for managing mapping sets. It holds a set of mapping set
      references, and can import other registries.
    from_schema: https://w3id.org/sssom/schema/
    slots:
    - mapping_registry_id
    - mapping_registry_title
    - mapping_registry_description
    - imports
    - mapping_set_references
    - documentation
    - homepage
    - issue_tracker
    class_uri: sssom:MappingRegistry
  mapping set reference:
    name: mapping set reference
    description: A reference to a mapping set. It allows to augment mapping set metadata
      from the perspective of the registry, for example, providing confidence, or
      a local filename or a grouping.
    from_schema: https://w3id.org/sssom/schema/
    slots:
    - mapping_set_id
    - mirror_from
    - registry_confidence
    - mapping_set_group
    - last_updated
    - local_name
    class_uri: sssom:MappingSetReference
  prefix:
    name: prefix
    from_schema: https://w3id.org/sssom/schema/
    slots:
    - prefix_name
    - prefix_url
    class_uri: sssom:Prefix
  extension definition:
    name: extension definition
    description: A definition of an extension (non-standard) slot.
    from_schema: https://w3id.org/sssom/schema/
    slots:
    - slot_name
    - property
    - type_hint
    class_uri: sssom:ExtensionDefinition
  Propagatable:
    name: Propagatable
    description: Metamodel extension class to describe slots whose value can be propagated
      down from the MappingSet class to the Mapping class.
    from_schema: https://w3id.org/sssom/schema/
    see_also:
    - https://github.com/mapping-commons/sssom/issues/305
    attributes:
      propagated:
        name: propagated
        description: Indicates whether a slot can be propagated from a mapping down
          to individual mappings.
        from_schema: https://w3id.org/sssom/schema/
        range: boolean
    class_uri: sssom:Propagatable
  NoTermFound:
    name: NoTermFound
    description: sssom:NoTermFound can be used in place of a subject_id or object_id
      when the corresponding entity could not be found. It SHOULD be used in conjuction
      with a corresponding subject_source or object_source to signify where the term
      was not found.
    from_schema: https://w3id.org/sssom/schema/
    see_also:
    - https://github.com/mapping-commons/sssom/issues/28
    - https://github.com/mapping-commons/sssom/blob/master/examples/schema/no_term_found.sssom.tsv
    class_uri: sssom:NoTermFound
