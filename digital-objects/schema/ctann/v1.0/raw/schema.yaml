      in the mapping set.
    from_schema: https://w3id.org/sssom/schema/
    slot_uri: sssom:registry_confidence
    range: double
  last_updated:
    name: last_updated
    description: The date this reference was last updated.
    from_schema: https://w3id.org/sssom/schema/
