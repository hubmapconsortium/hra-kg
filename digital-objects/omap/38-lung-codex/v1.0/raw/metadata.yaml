title: >-
  OMAP-38: Expanded Organ Mapping Antibody Panel (OMAP) for Multiplexed Antibody-Based Imaging of Human Lung with CODEX
description: |-
  OMAP-38 was designed for Multiplexed Immunofluorescent (MxIF) imaging of human FFPE lung sections utilizing Akoya’s 
  Phenocycler-Fusion platform as described [DOI:10.17504/protocols.io.6qpvr38dpvmk/v3](https://doi.org/10.17504/protocols.io.6qpvr38dpvmk/v3). The panel contains 
  35-antibodies and the nuclear stain, DAPI, for image alignment and nuclear segmentation. OMAP-38 provides spatial 
  context for airway, vasculature, alveolar, and extracellular matrix (ECM) features, and identifies approximately 28 
  of 72 key epithelial, endothelial, and immune cell types in the ASCT+B lung table v1.2. 
  (https://hubmapconsortium.github.io/ccf-releases/v1.2/docs/asct-b/lung.html). In addition to markers for cell type 
  and ECM annotation, OMAP-38 contains antibodies targeting seven cell state markers (GDF15, GLB1, H2AX, HMGB1, LMNB1, 
  CDKN1A, and CDKN2A) collectively referred to as senescence (SEN) markers whose expression has been associated with 
  senescent phenotype(s). OMAP-38 does not identify BDNF, FUT4, NT5E, TP53, or FOXO4 expressing cells due to inability 
  to validate Ab-Barcode conjugates targeting these markers. Details regarding antigen retrieval in AR9 Buffer (Akoya 
  Biosciences) at high pressure (110C) 20’ and MxIF imaging of lung sections are described in the forementioned protocol. 
  A general description of Ab validation for MxIF utilizing the Phenocyler-Fusion platform is described here 
  [DOI:10.17504/protocols.io.rm7vzkm14vx1/v1](https://doi.org/10.17504/protocols.io.rm7vzkm14vx1/v1).  The strategy for validation of senescence (SEN) markers relied 
  primarily on analysis of marker expression in control vs. irradiated Precision Cut Lung Sections (PCLS), and staining 
  in donor lungs from “healthy” controls versus lung tissue exhibiting pathological features associated with 
  Bronchopulmonary Dysplasia (BPD) or Idiopathic Pulmonary Fibrosis (IPF). Protein targets were detected with antibody 
  barcode conjugates obtained directly from Akoya Biosciences, or via custom conjugation of commercially available 
  antibodies utilizing antibody conjugation kit (Cat# 232195, Akoya).  Whereas antibodies targeting abundant expressed 
  pan markers identifying major cell types (e.g. PanCK, ACTA2) can be imaged in later cycles, lesser expressed markers 
  are early in the panel cycles and in the more sensitive channels. AVRs for each antibody used in the OMAP can be 
  found here (avr.xconsortia.org).  Image analysis methods included cell segmentation and annotation vascular airway 
  features and export of annotations and masks is described here [DOI:10.17504/protocols.io.6qpvr38dpvmk/v3](https://doi.org/10.17504/protocols.io.6qpvr38dpvmk/v3).

  **Bibliography:**

  * Pryhuber, Gloria. 2021. “Lung (v1.2) Graph Data, v1.2.” https://lod.humanatlas.io/asct-b/lung/v1.2/.
  * Purkerson, Jeffrey, Gloria S. Pryhuber, Luis Colon, and Heidie Huyck. 2025a. “813.1 Multiplexed Immunofluorescence Phenocycler-Fusion® Imaging of FFPE Lung Sections.” https://www.protocols.io/view/813-1-multiplexed-immunofluorescence-phenocycler-f-dt3j6qkn.
  * Purkerson, Jeffrey, Gloria S. Pryhuber, Luis Colon, and Heidie Huyck. 2025b. “813.1 Multiplexed Immunofluorescence Phenocycler-Fusion® Imaging of FFPE Lung Sections.” https://www.protocols.io/view/813-1-multiplexed-immunofluorescence-phenocycler-f-dt3j6qkn.
  * Purkerson, Jeffrey, Gloria S. Pryhuber, Heidie Huyck, and Gail Deutsch. 2025. “812.2 Lung FFPE Multiplexed Immunofluorescence Phenocycler-Fusion® Antibody Validation Protocol.” https://www.protocols.io/view/812-2-lung-ffpe-multiplexed-immunofluorescence-phe-dqjn5ume.
