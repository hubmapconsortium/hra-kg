title: 2D Endocrine Pancreas FTU for Pancreas
description: |-
  This functional tissue unit (FTU) illustration includes cell types related to the islets of Langerhans of endocrine pancreas FTU in the ASCT+B Table [Pancreas <>](<>). Cell type and measurements were referenced from (Da Silva Xavier 2018). Uberon describes this FTU as follows: "The part of the pancreas that is part of the endocrine system and is made up of islet cells, which produce insulin, glucagon and somatostatin." 

  **Bibliography**:

  * Da Silva Xavier, Gabriela. 2018. “The Cells of the Islets of Langerhans.” *Journal of Clinical Medicine* 7 (3): 54. https://doi.org/10.3390/jcm7030054.
